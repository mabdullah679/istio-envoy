apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: demo-apps
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - demo.local
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: service-a
  namespace: demo-apps
spec:
  hosts:
    - demo.local
  gateways:
    - demo-gateway
  http:
    - match:
        - uri:
            prefix: /api/public
      route:
        - destination:
            host: service-a.demo-apps.svc.cluster.local
            port:
              number: 8080

